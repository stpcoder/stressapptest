# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json

site_name: StressAppTest 설명
site_description: Android ARM64 환경에서 stressapptest의 메모리 부하, cache 동작, Worker와 데이터 검사 과정을 설명합니다.
site_url: https://stpcoder.github.io/stressapptest/
repo_url: https://github.com/stpcoder/stressapptest
repo_name: stpcoder/stressapptest
docs_dir: docs
site_dir: site
use_directory_urls: true

copyright: 기준 소스 73b9df2 · Apache License 2.0

theme:
  name: material
  language: ko
  icon:
    logo: material/memory
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: light blue
      accent: cyan
  font:
    text: Noto Sans KR
    code: JetBrains Mono

plugins:
  - search:
      lang: ko

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - 시작:
      - 개요: README.md
      - stressapptest의 작동 원리: 01-overview.md
      - 실행 순서 한눈에 보기: 02-execution-flow.md
  - 메모리 부하 과정:
      - 테스트 메모리 준비 과정: 03-memory-and-physical-mapping.md
      - Cache에서 LPDDR까지 데이터가 이동하는 과정: 04-cache-and-arm64.md
      - 메모리 block 관리 방법: 05-block-and-queue.md
      - 메모리에 기록하는 테스트 데이터: 06-patterns.md
      - 메모리를 복사하고 오류를 찾는 과정: 09-copy-and-verification.md
  - Worker 종류:
      - 메모리 Worker 종류와 동작: 07-memory-workers.md
      - I/O·CPU Worker 종류와 동작: 08-io-and-system-workers.md
  - 실행과 측정:
      - Android ARM64 빌드와 실행: 11-android-build-and-run.md
      - 목적에 따른 테스트 명령: 12-test-recipes.md
      - 명령행 옵션 정리: 10-all-options.md
      - 부하와 오류를 측정하는 방법: 13-measurement.md
  - 참고:
      - 분석 기준과 버전: 00-scope-and-version.md
      - 모바일 환경에서 알아둘 제한사항: 14-limitations.md
      - 소스 코드 찾아보기: 15-source-map.md
      - 용어 설명: 16-glossary.md
